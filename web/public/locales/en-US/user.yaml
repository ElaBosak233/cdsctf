delete_account:
  _: Delete Account
  final_warning: Final Warning
  warnings:
    intro: You are deleting your account. Your account will not be truly deleted, but will be permanently soft-deleted and cannot be recovered.
    username: Your username will be modified and saved in a special form. You can register a new account with your original username.
    email: Your email will be unbound and cleared. You can register a new account with your original email.
    data: All your related competition, team, and submission data will still be retained. However, after deletion, no information can prove that this data belongs to you.
    irreversible: Please note again, the following operation is irreversible! Think twice before proceeding!
    confirm: Please read and confirm the above content carefully! If you really want to delete your account, enter your full username and password below and click confirm.
  form:
    username:
      _: Username
      messages:
        _: Please enter a username
        match: Username does not match
