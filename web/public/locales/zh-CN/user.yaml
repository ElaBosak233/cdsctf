delete_account:
  _: 移除存档
  final_warning: 最后警告
  warnings:
    intro: 你正在注销你的账号。但是你的账号不会被真正地删除，而是将永久处于软删除状态。且无法恢复！
    username: 你的用户名会以一种特别的形式修改并保存。你可以使用原先的用户名注册新的账号。
    email: 你的邮箱会被全部解绑并清除。你可以使用原先的邮箱注册新的账号。
    data: 所有与你相关的比赛、团队、提交等数据仍然会被留存。但在注销账号后，没有任何信息可以证明这些数据属于你。
    irreversible: 请再次注意，你接下来的操作是不可逆的！请三思而后行！
    confirm: 请认真阅读并确定上述内容！如果你真的确定要注销账号，请在下方输入你的完整用户名、密码并点击确认。
  form:
    username:
      _: 用户名
      messages:
        _: 请输入用户名
        match: 用户名不匹配
    password:
      _: 密码
      message: 请输入密码
    captcha:
      _: 验证码
      message: 请输入验证码
  actions:
    delete:
      success: 注销成功
